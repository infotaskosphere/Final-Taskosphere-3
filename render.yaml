##############################################################################
# render.yaml — Taskosphere service definitions
#
# Deploy instructions:
#   1. Connect your GitHub repo to Render
#   2. Render will auto-detect this file and create all services
#   3. Set the required environment variables in each service's dashboard
##############################################################################

services:

  # ── Backend (Python / FastAPI) ─────────────────────────────────────────────
  - type: web
    name: final-taskosphere-backend
    env: python
    rootDir: .
    buildCommand: bash build.sh
    startCommand: uvicorn backend.server:app --host 0.0.0.0 --port $PORT
    envVars:
      # ⚠️ CRITICAL: this MUST be the live wa-bridge service URL. If this is
      # wrong (e.g. left as a placeholder, or the wa-bridge service was
      # renamed), every WhatsApp Hub session/QR/sync call will fail —
      # usually silently, since most callers catch and ignore bridge errors.
      - key: WA_BRIDGE_URL
        value: https://final-taskosphere-wa-bridge.onrender.com
      - key: MONGO_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /health

  # ── Frontend (React / Vite) ────────────────────────────────────────────────
  - type: web
    name: final-taskosphere-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /assets/*.css
        name: Content-Type
        value: text/css; charset=utf-8
      - path: /assets/*.js
        name: Content-Type
        value: application/javascript; charset=utf-8
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── WhatsApp Bridge (Node.js / Baileys) ───────────────────────────────────
  - type: web
    name: final-taskosphere-wa-bridge
    env: node
    rootDir: wa-bridge
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      # ⚠️ CRITICAL: this MUST be the live backend service URL. The bridge
      # posts every incoming message and history sync to
      # ${BACKEND_URL}/api/whatsapp/hub/webhook/*. If this URL is wrong,
      # WhatsApp numbers will show "connected" in the Hub forever while
      # 0 chats ever load — there is no error shown anywhere in the UI for
      # this specific failure mode (see wa-bridge/index.js startup self-test
      # log for a loud warning if this is misconfigured).
      - key: BACKEND_URL
        value: https://final-taskosphere-backend.onrender.com
      # PORT is injected automatically by Render — no need to set it
    disk:
      name: wa-sessions
      mountPath: /opt/render/project/src/sessions
      sizeGB: 1
