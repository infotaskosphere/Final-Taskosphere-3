name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Expo & EAS
        run: |
          npm install -g expo-cli
          npm install -g eas-cli

      - name: Go to mobile folder & install deps
        run: |
          cd mobile
          pnpm install

      - name: Add ENV
        run: |
          cd mobile
          echo "EXPO_PUBLIC_API_BASE_URL=https://final-taskosphere-backend.onrender.com" >> .env

      - name: Expo Login
        run: eas login --token ${{ secrets.EXPO_TOKEN }}

      - name: Run EAS Build
        run: |
          cd mobile
          eas build -p android --profile preview --non-interactive
