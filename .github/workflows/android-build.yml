name: Build APK (Stable)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # ✅ Setup Node (NO pnpm cache here)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ✅ Setup Java (Required for Android build)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ Install pnpm (IMPORTANT - before using it)
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # ✅ Install dependencies (safe mode)
      - name: Install dependencies
        working-directory: mobile
        run: pnpm install --no-frozen-lockfile

      # ✅ Expo prebuild (CI-safe)
      - name: Expo Prebuild
        working-directory: mobile
        run: |
          export CI=1
          export EXPO_NO_DOCTOR=1
          npx expo prebuild --platform android --clean

      # ✅ Build APK
      - name: Build APK
        working-directory: mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace -Dorg.gradle.jvmargs="-Xmx4g"

      # ✅ Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
