name: Build APK (Stable)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'

      - name: Setup Java (IMPORTANT)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # ✅ KEY FIX: safer install
      - name: Install dependencies
        working-directory: mobile
        run: pnpm install --no-frozen-lockfile

      # ✅ KEY FIX: Expo CI compatibility
      - name: Fix Expo config (IMPORTANT)
        working-directory: mobile
        run: |
          export CI=1
          export EXPO_NO_DOCTOR=1
          npx expo prebuild --platform android --clean

      # ✅ KEY FIX: Gradle stability
      - name: Build APK
        working-directory: mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
